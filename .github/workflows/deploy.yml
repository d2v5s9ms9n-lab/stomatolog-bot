name: Deploy Stomatolog Bot

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
        - production
        - staging

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest
    
    - name: Run tests
      run: |
        echo "Running tests..."
        # Add your test commands here
        # pytest tests/
    
    - name: Lint code
      run: |
        echo "Linting code..."
        # Add linting commands here
        # flake8 .

  deploy:
    needs: test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Create deployment package
      run: |
        echo "Creating deployment package..."
        zip -r stomatolog-bot.zip . -x '*.git*' '*.github*' '*.env'
    
    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: stomatolog-bot
        path: stomatolog-bot.zip
    
    - name: Deploy to PythonAnywhere (manual)
      run: |
        echo "Deployment instructions:"
        echo "1. Download the artifact from this workflow run"
        echo "2. Upload to PythonAnywhere or your hosting provider"
        echo "3. Install dependencies: pip install -r requirements.txt"
        echo "4. Set environment variables in .env file"
        echo "5. Run the bot: python bot.py"
      shell: bash

  notify:
    needs: deploy
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Notify deployment status
      run: |
        echo "Deployment workflow completed"
        echo "Status: ${{ job.status }}"
      shell: bash
